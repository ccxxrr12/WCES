# WCES — 竞赛系统统一配置文件
# 此文件覆盖固件(Kconfig/NVS)、服务端(CLI)、部署(deploy.sh)的所有配置
# 用法: 修改此文件 → 运行 ./apply-config.sh 自动应用到三个子系统

# ============================================================================
# 固件 — ESP32-C5 CSI 感知节点
# ============================================================================
[firmware]

# --- 节点身份 ---
node_id = 1                     # 节点编号 (1/2/3), 三个节点唯一区别
# 节点 2 改为 2, 节点 3 改为 3

# --- WiFi 连接 ---
wifi_ssid = "WCES"             # WiFi SSID (竞赛专用)
wifi_password = ""             # WiFi 密码 (空 = 开放网络)
wifi_auth = "OPEN"             # WPA2_PSK | OPEN | WPA3_SAE

# --- CSI 采集 ---
csi_channel = 6                # 主信道 (2.4G: 1-13, 5G: 36-177, 6G: 1-233)
csi_band = "AUTO"              # AUTO | 2G_ONLY | 5G_ONLY (C5 双频)
                                # ⚠️ 5G/6G 需要 ESP-IDF v5.5+

# --- UDP 发送目标 (RZ/G2L 主控) ---
target_ip = "192.168.1.1"      # sensing-server 地址
target_port = 5005             # UDP 接收端口

# --- 处理层级 ---
[firmware.edge]
tier = 2                       # 0=原始透传, 1=基础DSP, 2=完整管线
vital_interval_ms = 1000       # 生命体征包发送间隔 (ms)
top_k_count = 8                # Top-K 高方差子载波数
presence_thresh = 0.0          # 存在检测阈值 (0=自动校准)
fall_thresh = 400.0            # 跌倒检测阈值 (rad/s²)
vital_window = 64              # BPM 相位历史窗口帧数
power_duty = 100               # 电源占空比 (10-100%)

# --- 信道跳跃 (ADR-029) ---
[firmware.hop]
enabled = true                  # 启用多频段信道跳跃
channels = [1, 6, 11, 36, 40, 44]  # 跳跃信道列表 (2.4G + 5G)
dwell_ms = 50                   # 每信道停留时间 (ms)

# --- 时隙调度 (TDM) ---
[firmware.tdm]
node_count = 3                  # 总节点数 (用于时隙分配)
slot_index = 1                  # 本节点时隙 (1-based, 按 node_id)

# --- WASM 边缘模块 ---
[firmware.wasm]
max_modules = 4                 # 最大并发 WASM 模块 (1-8)
verify_signature = true         # 要求 Ed25519 签名
frame_budget_us = 10000         # 每帧执行预算 (µs)

# ============================================================================
# Rust 服务端 — sensing-server
# ============================================================================
[server]

# --- 运行模式 ---
source = "auto"                 # auto | esp32 | simulate
                                # auto: 自动检测 ESP32 UDP, 无信号则模拟
                                # esp32: 仅监听硬件 UDP
                                # simulate: 纯模拟 (无需硬件)

# --- 端口 ---
http_port = 8080                # HTTP + 静态 UI
ws_port = 8765                  # WebSocket 实时数据推送
udp_port = 5005                 # UDP CSI 数据接收
bind_addr = "0.0.0.0"          # 绑定地址

# --- UI 路径 ---
ui_path = "../docs/triage-ui"   # 分诊仪表盘目录 (相对于 rust-server/)

# --- 日志 ---
log_level = "info"              # trace | debug | info | warn | error
log_file = "/tmp/wces-server.log"  # 日志文件路径

# --- 模型 ---
[server.model]
load_on_startup = false         # 启动时加载 DensePose 模型 (费内存)
model_path = "data/models/"     # .rvf 模型搜索路径
pose_synthetic = true          # 模拟模式下生成合成骨架 (无需模型文件)

# --- 端侧 Medical Agent (Phase 4) ---
# Coordinator 模式: RZ/G2L 信号处理 + 规则分诊 → 云端 LLM 深度分析
# 优雅降级: 网络中断/API故障时自动回退到本地模板分析
[server.agent]
enabled = true                      # 启用 Medical Agent 分析
mode = "agent"                      # agent = 云端LLM + 本地降级, template-only = 仅模板

# --- 触发与冷却 ---
periodic_analysis_secs = 30         # 周期巡检间隔 (0=仅事件触发)
analysis_timeout_secs = 120         # 单次分析超时 (秒)
per_patient_cooldown_secs = 300     # 同一伤员冷却时间 (秒), 避免频繁 API 调用
fallback_to_template = true         # LLM 失败时自动回退到模板分析

# --- 滑窗配置 ---
short_window_secs = 60              # 短期趋势窗口 (1分钟)
medium_window_secs = 300            # 中期趋势窗口 (5分钟)
long_window_secs = 1800             # 长期基线窗口 (30分钟)

# --- 知识库路径 ---
patient_db_path = "data/patients"                   # 病历数据库 (sled)
medical_kb_path = "data/medical_knowledge.json"      # 传统疾病知识库 (8种)
agent_kb_path = "data/agent_kb.json"                 # Agent 体征模式知识库 (16种)

# --- 云端 LLM 网关 (OpenAI 兼容 API) ---
[server.agent.gateway]
endpoint = ""                       # 空 = 自动使用 https://api.openai.com/v1/chat/completions
                                    # 可替换为任意 OpenAI 兼容端点 (vLLM/Ollama/LiteLLM)
model = "gpt-4o-mini"               # 模型名: gpt-4o-mini | gpt-4o | qwen2.5-7b | deepseek-v3 等
api_key = ""                        # API Key, 空 = 从环境变量 LLM_API_KEY 读取
timeout_secs = 20                   # 单次 HTTP 请求超时 (秒)
max_retries = 2                     # 失败后最大重试次数
temperature = 0.3                   # LLM 采样温度 (0-2, 越低越确定性)

# --- 熔断器 (Circuit Breaker) ---
[server.agent.circuit_breaker]
failure_threshold = 3               # 连续失败 N 次后打开熔断器
open_duration_secs = 300            # 熔断器打开后恢复等待时间 (秒)

# --- 降级阶梯 (Degradation Ladder) ---
[server.agent.degradation]
cooldown_secs = 300                 # 同一伤员重复分析冷却 (秒)
max_cache_size = 32                 # LRU 缓存上限 (条目数)
network_failure_threshold = 5       # 连续失败 N 次后标记网络不可达

# --- 输出校验 ---
[server.agent.validator]
enabled = true                      # 启用安全校验
block_medication = true             # 拦截药物建议
block_injection = true              # 拦截注射建议
block_dosage = true                 # 拦截剂量建议
block_surgery = true                # 拦截手术/处方建议
append_disclaimer = true            # 自动附加 [AI分析, 仅供参考]

# --- 边缘模块 ---
[server.edge_modules]
# 19 个模块, 可按需禁用 (false = 跳过)
vital_trend = true
lrn_anomaly_attractor = true
coherence = true
med_respiratory_distress = true
ind_confined_space = true
sec_panic_motion = true
med_sleep_apnea = true
med_cardiac_arrhythmia = true
med_seizure_detect = true
intrusion = true
occupancy = true
sig_mincut_person_match = true
sec_weapon_detect = true
med_gait_analysis = true
tmp_temporal_logic_guard = true
ind_structural_vibration = true
sec_loitering = true
lrn_meta_adapt = true
sig_sparse_recovery = true

# ============================================================================
# 部署 — deploy.sh 配置
# ============================================================================
[deploy]

# --- 瑞萨 RZ/G2L 目标 ---
rz_ip = "192.168.1.1"           # SSH 目标
rz_user = "root"                # SSH 用户
rz_project_root = "/opt/WCES"  # 项目根目录

# --- 二进制路径 (RZ/G2L 上) ---
sensing_bin = "./rust-server/target/aarch64-unknown-linux-gnu/release/sensing-server"
triage_ui = "./docs/triage-ui/triage.html"
ui_dir = "./ui"

# ============================================================================
# 竞赛 — 比赛专用配置
# ============================================================================
[competition]

# --- 网络拓扑 ---
router_ssid = "WCES"            # 现场路由器 SSID
router_ip = "192.168.1.1"      # 路由器管理 IP
subnet = "192.168.1.0/24"      # 局域网段

# --- 节点固定 IP ---
node1_ip = "192.168.1.10"      # ESP32-C5 #1
node2_ip = "192.168.1.11"      # ESP32-C5 #2
node3_ip = "192.168.1.12"      # ESP32-C5 #3

# --- 演示模式 ---
demo_cycle_seconds = 300        # 自动循环演示周期 (秒)
auto_start_triage = true        # 启动后自动打开分诊仪表盘

# --- 故障预案 ---
fault_tolerance = true          # 启用故障降级 (2/3 节点继续工作)
max_missed_frames = 30          # 超时帧数 → 标记 Unknown
reconnect_timeout_sec = 10      # WiFi 重连超时 (秒)

# --- 硬件 ---
flash_size = "8MB"              # 固件分区表: 8MB
chip = "esp32c5"                # 目标芯片
idf_version = "5.5"             # 最低 IDF 版本 ⚠️ v5.4 有 CSI bug

# ============================================================================
# 烧录 — ESP32-C5 固件烧录
# ============================================================================
[flash]
# 每个节点的串口 (Windows COM 或 Linux /dev/ttyUSB)
ports = ["COM3", "COM4", "COM5"]  # 节点1, 节点2, 节点3
baud = 921600                     # 烧录波特率
erase_before_flash = false        # 烧录前擦除 (首次需要)
